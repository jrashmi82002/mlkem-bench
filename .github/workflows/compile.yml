name: Cross-Compile & Simulate STM32 Binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. Added qemu-system-arm to the install list
    - name: Install ARM GCC, Ninja & QEMU Emulator
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi cmake ninja-build qemu-system-arm

    - name: Configure CMake Project
      run: |
        cmake -B build -G "Ninja" -DCMAKE_TOOLCHAIN_FILE="arm-none-eabi.cmake"

    - name: Compile Code
      run: |
        cmake --build build
        ls -R build 

    - name: Run Simulation in QEMU
      run: |
        qemu-system-arm -M netduinoplus2 -cpu cortex-m4 -nographic -kernel build/*.elf