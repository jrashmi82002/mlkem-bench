name: Simple QEMU Print Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-print:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Toolchain & QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build qemu-system-arm

    - name: Configure CMake
      run: |
        cmake -B build_hardware -G "Ninja" -DCMAKE_TOOLCHAIN_FILE="arm-none-eabi.cmake" -DTOOLCHAIN_ARM=ON

    - name: Build Binary
      run: |
        cmake --build build_hardware

    - name: Execute in QEMU Simulator
      run: |
        qemu-system-arm \
          -M netduinoplus2 \
          -nographic \
          -serial stdio \
          -semihosting \
          -kernel build_hardware/mlkem_stm32.elf