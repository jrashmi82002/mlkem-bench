name: Simple QEMU Print Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-print:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Toolchain & QEMU with Plugins
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build qemu-system-arm qemu-system-common

    - name: Configure CMake
      run: |
        cmake -B build_hardware -G "Ninja" -DCMAKE_TOOLCHAIN_FILE="arm-none-eabi.cmake" -DTOOLCHAIN_ARM=ON

    - name: Build Binary
      run: |
        cmake --build build_hardware

    - name: Execute in QEMU Simulator
      run: |
        # 1. Look for the instruction tracking plugin
        PLUGIN_PATH=$(find /usr -name "libinsn.so" 2>/dev/null | head -n 1)
        if [ -z "$PLUGIN_PATH" ]; then
          echo "[-] Warning: libinsn.so not found in /usr. Searching system-wide..."
          PLUGIN_PATH=$(find / -name "libinsn.so" 2>/dev/null | head -n 1)
        fi
        
        # 2. Check if plugin was found and route execution safely
        if [ -n "$PLUGIN_PATH" ]; then
          echo "[+] Found QEMU Instruction Plugin at: $PLUGIN_PATH"
          qemu-system-arm \
            -M netduinoplus2 \
            -display none \
            -serial stdio \
            -semihosting \
            -plugin "$PLUGIN_PATH" \
            -d plugin \
            -kernel build_hardware/mlkem_stm32.elf
        else
          echo "[!] GRACEFUL FALLBACK: Plugin not found even after installing common tools. Running standard simulation..."
          qemu-system-arm \
            -M netduinoplus2 \
            -display none \
            -serial stdio \
            -semihosting \
            -kernel build_hardware/mlkem_stm32.elf
        fi