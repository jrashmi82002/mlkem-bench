name: Cross-Compile & Simulate STM32 Binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. INSTANT TOOLCHAIN INSTALL
    - name: Setup ARM GCC Compiler
      uses: xmake-io/github-action-setup-arm-gcc@v1
      with:
        version: '13.2.rel1'

    # 2. Install only the lightweight utilities (CMake, Ninja, and QEMU)
    - name: Install Build Tools & QEMU Emulator
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build qemu-system-arm

    - name: Configure CMake Project
      run: |
        cmake -B build -G "Ninja" -DCMAKE_TOOLCHAIN_FILE="arm-none-eabi.cmake"

    - name: Compile Code
      run: |
        cmake --build build
        ls -R build

    - name: Run Simulation in QEMU
      run: |
        qemu-system-arm -M netduinoplus2 -cpu cortex-m4 -nographic -kernel build/*.elf