name: Cross-Compile & Simulate STM32 Binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. Install only the essential, lightweight toolchain packages + QEMU
    - name: Install ARM GCC Toolchain & QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi cmake ninja-build qemu-system-arm

    # 2. Configure using your project's build directory naming
    - name: Configure CMake Project
      run: |
        cmake -B build_hardware -G "Ninja" -DCMAKE_TOOLCHAIN_FILE="arm-none-eabi.cmake"

    # 3. Compile the code
    - name: Compile Code
      run: |
        cmake --build build_hardware
        ls -R build_hardware

    # 4. Upload your flashable files as zip artifacts
    - name: Upload Flashable Binaries
      uses: actions/upload-artifact@v4
      with:
        name: stm32-mlkem-firmware
        path: |
          build_hardware/mlkem_stm32.bin
          build_hardware/mlkem_stm32.hex
          build_hardware/mlkem_stm32.elf

    # 5. Run the simulation using multiplexed stdio routing
    - name: Run Simulation in QEMU
      run: |
        timeout 60s qemu-system-arm -M netduinoplus2 -cpu cortex-m4 -nographic -serial mon:stdio -kernel build_hardware/mlkem_stm32.elf || true